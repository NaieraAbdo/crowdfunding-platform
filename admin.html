<!DOCTYPE html>
<html>

<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="admin-nav">
        <h2>Admin Panel</h2>

        <div class="admin-links">
            <button onclick="showSection('users')">Users</button>
            <button onclick="showSection('campaigns')">Campaigns</button>
            <button onclick="showSection('pledges')">Pledges</button>
        </div>

        <button id="logoutBtn">Logout</button>
    </nav>

    <!-- CONTENT -->
    <div class="admin-container">

        <div id="usersSection" class="admin-section">
            <h3>Users</h3>
            <div id="usersTable"></div>
        </div>

        <div id="campaignsSection" class="admin-section" style="display:none;">
            <h3>Campaigns</h3>
            <div id="campaignsTable"></div>
        </div>

        <div id="pledgesSection" class="admin-section" style="display:none;">
            <h3>Pledges</h3>
            <div id="pledgesTable"></div>
        </div>

    </div>

    <script src="js/api.js"></script>
    <script src="js/admin.js"></script>

</body>

</html>
