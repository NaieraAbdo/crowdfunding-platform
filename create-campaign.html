<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Create Campaign</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

    <div id="toast"></div>

    <div class="create-page">
        <div class="form-container">

            <h2>Create New Campaign</h2>

            <form id="campaignForm">

                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="title" placeholder="Enter campaign title" required>
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea id="description" placeholder="Describe your idea..." required></textarea>
                </div>

                <div class="form-row">

                    <div class="form-group">
                        <label>Goal Amount ($)</label>
                        <input type="number" id="goal" placeholder="5000" required>
                    </div>

                    <div class="form-group">
                        <label>Deadline</label>
                        <input type="date" id="deadline" required>
                    </div>

                </div>

                <!-- 🟢 CATEGORY -->
                <div class="form-group">
                    <label>Category</label>
                    <select id="category" required>
                        <option value="">Select Category</option>
                        <option value="Tech">Tech</option>
                        <option value="Art">Art</option>
                        <option value="Music">Music</option>
                        <option value="Education">Education</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Campaign Image</label>
                    <input type="file" id="imageInput" accept="image/*">
                </div>

                <img id="preview" class="preview-img" style="display:none;">

                <button type="submit">Create Campaign</button>

            </form>

        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/create-campaign.js"></script>

</body>

</html>
